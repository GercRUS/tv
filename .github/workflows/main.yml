name: Build Release APK
on: [workflow_dispatch]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Strip BOM from all files
        run: find . -type f -name "*.gradle" -o -name "*.java" -o -name "*.xml" | xargs sed -i '1s/^\xef\xbb\xbf//'
      
      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle
          
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew
        
      - name: Build Release APK
        run: ./gradlew assembleRelease
        
      # Создаем временный ключ и подписываем APK
      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          # Если секреты не настроены, билд не упадет, но и не подпишется. 
          # Мы сейчас их настроим ниже.
          BUILD_TOOLS_VERSION: "33.0.1"

      - name: Upload Finished APK
        uses: actions/upload-artifact@v4
        with:
          name: IPTV-PRO-Release
          path: app/build/outputs/apk/release/*-unsigned.apk 
          # На самом деле нам нужен подписанный, но для простоты без секретов 
          # я дам тебе способ ниже, как сделать это без мучений.
